name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag version
        run: |
          python - <<'PY'
          import pathlib
          import re
          import tomllib

          tag = "${{ github.ref_name }}"
          version = tag.removeprefix("v")
          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          init = pathlib.Path("jarv/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__ = "([^"]+)"', init)
          package_version = match.group(1) if match else None
          if project != version or package_version != version:
              raise SystemExit(
                  f"Tag {tag} does not match pyproject.toml={project} and jarv/__init__.py={package_version}"
              )
          PY

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
          pytest

  build-python:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish-pypi:
    needs: build-python
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  build-standalone:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            platform: windows
            arch: x86_64
            python-architecture: x64
            asset-suffix: windows-x86_64.zip
          - runner: windows-11-arm
            platform: windows
            arch: arm64
            python-architecture: arm64
            asset-suffix: windows-arm64.zip
          - runner: macos-15-intel
            platform: macos
            arch: x86_64
            python-architecture: x64
            asset-suffix: macos-x86_64.tar.gz
          - runner: macos-15
            platform: macos
            arch: arm64
            python-architecture: arm64
            asset-suffix: macos-arm64.tar.gz
          - runner: ubuntu-24.04
            platform: linux
            arch: x86_64
            python-architecture: x64
            asset-suffix: linux-x86_64.tar.gz
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            python-architecture: arm64
            asset-suffix: linux-aarch64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-architecture }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install .

      - name: Ensure Windows ARM64 PyInstaller bootloader
        if: matrix.platform == 'windows' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys

          import PyInstaller

          bootloader = pathlib.Path(PyInstaller.__file__).with_name("bootloader")
          has_arm64 = any("arm" in str(path).lower() for path in bootloader.rglob("run.exe"))
          if not has_arm64:
              subprocess.check_call([
                  sys.executable,
                  "-m",
                  "pip",
                  "install",
                  "--force-reinstall",
                  "--no-binary",
                  "pyinstaller",
                  "pyinstaller",
              ])
          PY

      - name: Build standalone executable
        run: pyinstaller --clean --onefile --name jarv packaging/pyinstaller_launcher.py

      - name: Smoke test executable
        shell: bash
        run: |
          exe="./dist/jarv"
          if [ "${{ matrix.platform }}" = "windows" ]; then exe="./dist/jarv.exe"; fi
          "$exe" --version
          "$exe" /about
          "$exe" /config

      - name: Package release archive
        shell: bash
        env:
          ASSET_SUFFIX: ${{ matrix['asset-suffix'] }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          python - <<'PY'
          import os
          import shutil
          import tarfile
          import zipfile
          from pathlib import Path

          asset_name = f"jarv-${os.environ['GITHUB_REF_NAME'].removeprefix('v')}-{os.environ['ASSET_SUFFIX']}"
          platform = os.environ["PLATFORM"]
          staging = Path("release-stage")
          output = Path("release-builds")
          staging.mkdir(exist_ok=True)
          output.mkdir(exist_ok=True)

          exe_name = "jarv.exe" if platform == "windows" else "jarv"
          shutil.copy2(Path("dist") / exe_name, staging / exe_name)
          shutil.copy2("README.md", staging / "README.md")
          shutil.copy2("LICENSE", staging / "LICENSE")

          destination = output / asset_name
          if asset_name.endswith(".zip"):
              with zipfile.ZipFile(destination, "w", compression=zipfile.ZIP_DEFLATED) as archive:
                  for path in sorted(staging.iterdir()):
                      archive.write(path, path.name)
          else:
              with tarfile.open(destination, "w:gz") as archive:
                  for path in sorted(staging.iterdir()):
                      archive.add(path, arcname=path.name)
          print(destination)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: standalone-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-builds/*

  release-metadata:
    needs: build-standalone
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: binary-assets/
          pattern: standalone-*
          merge-multiple: true

      - name: Generate manifest and checksums
        run: |
          python scripts/generate_release_metadata.py \
            --version "${GITHUB_REF_NAME#v}" \
            --repository "${GITHUB_REPOSITORY}" \
            --asset-dir binary-assets \
            --output-dir release-assets \
            --installer scripts/install.sh \
            --installer scripts/install.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/

  github-release:
    needs: [build-python, publish-pypi, release-metadata]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets/

      - name: Extract release notes from annotated tag
        shell: bash
        run: |
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

          tag_type="$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")"
          if [ "$tag_type" != "tag" ]; then
            echo "::error::${GITHUB_REF_NAME} is not an annotated tag. Create releases with: git tag -a ${GITHUB_REF_NAME} -F release-notes.md"
            exit 1
          fi

          git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents:body)' > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::Annotated tag ${GITHUB_REF_NAME} has no release-notes body. Use a tag message with a title line, blank line, then release notes."
            exit 1
          fi

          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            release-assets/*
          body_path: release-notes.md
          generate_release_notes: true

  package-manager-metadata:
    needs: github-release
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Create or update WinGet manifest PR
        if: ${{ env.WINGET_TOKEN != '' }}
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME.TrimStart("v")
          $InstallerUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/jarv-$Version-windows-x86_64.zip"
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          ./wingetcreate.exe update JamesWHomer.Jarv --version $Version --urls $InstallerUrl --token $env:WINGET_TOKEN --submit

      - name: Package manager repository note
        shell: bash
        run: |
          echo "Homebrew tap and Scoop manifests live in separate repositories."
          echo "Update JamesWHomer/homebrew-tap and JamesWHomer/scoop-jarv from release-manifest.json."
