name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publisher OIDC auth
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from annotated tag
        shell: bash
        run: |
          # actions/checkout can rewrite refs/tags/$GITHUB_REF_NAME to the
          # target commit, losing the annotated tag message. Re-fetch the real
          # tag object before reading its contents.
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

          tag_type="$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")"
          if [ "$tag_type" != "tag" ]; then
            echo "::error::${GITHUB_REF_NAME} is not an annotated tag. Create releases with: git tag -a ${GITHUB_REF_NAME} -F release-notes.md"
            exit 1
          fi

          git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents:body)' > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::Annotated tag ${GITHUB_REF_NAME} has no release-notes body. Use a tag message with a title line, blank line, then release notes."
            exit 1
          fi

          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes.md
          generate_release_notes: true
